<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlet Abdias</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>

</head>

<body>
    <h1>Outlet Abdias</h1>

    <div class="box">
        <form>
            <p>Login:</p>
            <input type="text" class="login" id="login" placeholder="Digite seu login:">
            <button onclick="validarLogin()">Validar Login</button>

            <p>Senha:</p>
            <input type="password" class="senha" id="senha" placeholder="Digite sua senha: ">
            <button onclick="validarSenha()">Validar Senha</button>
        </form>
    </div>

</body>

</html>
